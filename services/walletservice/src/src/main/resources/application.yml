spring:
  application:
    name: wallet-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wallet_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

server:
  port: 8082

logging:
  level:
    com.haizz.exchange.wallet: INFO

wallet:
  jwt:
    algorithm: ${JWT_ALGORITHM:HS256}
    secret: ${JWT_SECRET:change-me-in-prod-must-be-at-least-32-chars!}
  kafka:
    user-events-topic: user.events.v1
    trade-executed-topic: trade.executed
    wallet-transactions-topic: wallet.transactions.v1
  outbox:
    relay-fixed-delay-ms: 100
    relay-batch-size: 100
  assets:
    supported-assets:
      - USDT
      - BTC
      - ETH
      - BNB
      - SOL
      - XRP
